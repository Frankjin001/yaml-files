# 机场订阅
proxy-providers:
  FlowerCloud:
    url: "输入机场订阅1"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    header:
      User-Agent:
      - "Clash"
      - "mihomo"
      - "Clash.meta"

  LiuLiangGuang:
    url: "输入机场订阅2"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    header:
      User-Agent:
      - "Mozilla/5.0 (Linux; Android 12; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/75.0.3770.156 Mobile Safari/537.36 aweme_210600 JsSdk/1.0 NetType/4G AppName/aweme app_version/21.6.0 ByteLocale/zh-CN Region/CN BytedanceWebview/d8a21c6 Build/21060001"
  #    - "Clash"
  #    - "mihomo"
  #    - "Clash.meta"


  CF-Workers:
    type: http
    url: "https://tiger-queen.myworldmyway.top/<Input your UUID Here>/pcl"
    interval: 86400  # 每天更新一次
    path: ./proxy_provider/cf_workers.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300


# 节点信息
proxies:
  - {name: 直连, type: direct, udp: true}



# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
#ipv6: false
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
# interface-name: en0
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: "/etc/mihomo/run/ui"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "rule-set:private_domain,cn_domain"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.vivox.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

# 入站  
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
#  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "+.services.googleapis.cn"
    - "+.xn--ngstr-lra8j.com"
    - "time.*.com"
    - "+.pool.ntp.org"
    - "+.ntp.tencent.com"
    - "+.ntp1.aliyun.com"
    - "+.ntp.ntsc.ac.cn"
    - "+.cn.ntp.org.cn"
  
  # 用于解析 nameserver,fallback 以及其他 DNS 服务器配置的,DNS 服务域名
  # 只能使用纯 IP 地址,可使用加密 DNS
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  
  # 专用于节点域名解析的DNS服务器,非必要配置项,如果不填则遵循nameserver-policy、nameserver和fallback的配置
  # 这里保证了机场订阅中的域名会被国内DNS服务器解析。订阅服务器通常位于国内,下发机场代理节点信息,代理节点位于国外。
  # 有的机场,订阅服务器国内外都有,如果被国外的DNS服务器解析,有肯能返回一个国外的订阅服务器,这样有可能不能连接,或者拿不到正确的代理节点信息。
  proxy-server-nameserver:
    - 223.5.5.5
    - 114.114.114.114
    
 
  # 配置查询域名使用的 DNS 服务器,主力DNS服务。
  nameserver-policy:

    # 1. 专项域名锁定（最优先匹配，去除域名两边的单引号）
    www.xn--sss604efuw.com: 'https://1.1.1.1/dns-query'
    '*.xn--sss604efuw.com': 'https://1.1.1.1/dns-query'
    xn--sss604efuw.com: 'https://1.1.1.1/dns-query' # 补一个不带 www 的根域名
    饭太硬.com: 'https://1.1.1.1/dns-query'
    '*.饭太硬.com': 'https://1.1.1.1/dns-query'
    
    # 2. 规则集分流（后匹配）
    "rule-set:cn_domain":
      -         # 你的 ISP DNS
      - 
    "rule-set:geolocation-!cn":     # 国外的域名查询国外的DNS服务器,用IP比域名好,否则还要查询default-nameserver来解析这里的域名
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query


  # namesever尽量用运营商提供的DNS
  # 只有当上面定义的DNS服务器都失败的时候,才会使用。
  nameserver:
      -         # 你的 ISP DNS
      - 

  fallback:
    - https://1.0.0.1/dns-query
    - https://8.8.4.4/dns-query


# Summary of priority
# nameserver-policy → rule-matched domains
# nameserver → unmatched domains
# default-nameserver → fallback, when the above 2 fail
# proxy-server-nameserver → only for proxy node hostnames



 
